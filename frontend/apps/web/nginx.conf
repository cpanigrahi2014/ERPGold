# NEXUS web console — serves the React SPA and reverse-proxies the
# 10 backend services so the browser only ever talks to one origin.
#
# Upstreams are resolved at REQUEST time via Docker's embedded DNS (127.0.0.11)
# rather than at startup. This means the web container starts even if some
# backend services are not yet running — those endpoints simply return 502
# until their containers come up.

server {
  listen 80;
  server_name _;
  client_max_body_size 25m;

  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 5s;

  # ----- API proxies (one per module) -----
  location ~ ^/api/admin/(.*)$         { set $up admin-service:8084;          proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/inventory/(.*)$     { set $up inventory-service:8085;      proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/testing/(.*)$       { set $up testing-service:8086;        proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/hm/(.*)$            { set $up hm-service:8087;             proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/laser/(.*)$         { set $up laser-service:8088;          proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/refinery/(.*)$      { set $up refinery-service:8089;       proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/exchange/(.*)$      { set $up exchange-service:8090;       proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/billing/(.*)$       { set $up billing-service:8091;        proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/records/(.*)$       { set $up records-service:8092;        proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }
  location ~ ^/api/notifications/(.*)$ { set $up notifications-service:8093;  proxy_pass http://$up/$1$is_args$args; include /etc/nginx/conf.d/_proxy.inc; }

  # ----- Static SPA -----
  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
