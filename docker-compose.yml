# ====================================================================
# NEXUS ERP — FULL standalone single-customer deployment.
# One command brings up the entire 10-module ERP plus the unified UI:
#
#   docker compose -f docker-compose.full.yml up -d
#
# Endpoints (all on localhost):
#   - Unified UI:       http://localhost:3010
#   - Admin API:        :8084   - Inventory:       :8085
#   - Testing:          :8086   - Hallmarking:     :8087
#   - Laser Marking:    :8088   - Refinery:        :8089
#   - Exchange:         :8090   - Billing:         :8091
#   - Business Records: :8092   - Notifications:   :8093
#
# Each backend exposes /actuator/health and /swagger-ui.html.
# Default credentials: admin@nexus.local / admin123 (or anonymous in standalone).
# Standalone flags (<MODULE>_STANDALONE=true) permit unauthenticated calls
# stamped against the default tenant — convenient for first-customer demos.
# ====================================================================
services:
  admin-postgres:
    image: postgres:17-alpine
    container_name: nexus-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_2026
      POSTGRES_DB: nexus_admin
    ports:
      - "5434:5432"
    volumes:
      - admin_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_admin"]
      interval: 5s
      timeout: 3s
      retries: 10

  admin-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.admin
    container_name: nexus-admin
    restart: unless-stopped
    depends_on:
      admin-postgres:
        condition: service_healthy
    ports:
      - "8084:8084"
    environment:
      DB_HOST: admin-postgres
      DB_PORT: 5432
      DB_NAME: nexus_admin
      DB_USERNAME: nexus
      DB_PASSWORD: nexus_dev_2026
      ADMIN_STANDALONE: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3004,http://localhost:3010,http://139.59.60.127:3010"
      JWT_SECRET: bXlTdXBlclNlY3JldEtleUZvck5leHVzRVJQSldUVG9rZW5TaWduaW5nMjAyNA==
      JAVA_OPTS: "-Xms256m -Xmx768m"

  # ===== Unified Web Console (React SPA) =====
  # Multi-stage build: Vite/React → static assets served + reverse-proxied
  # to every backend by nginx. Browser only ever talks to http://localhost:3010.
  web:
    build:
      context: ./frontend
      dockerfile: apps/web/Dockerfile
    container_name: nexus-web
    restart: unless-stopped
    depends_on:
      - admin-service
      - inventory-service
      - testing-service
      - hm-service
      - laser-service
      - refinery-service
      - exchange-service
      - billing-service
      - records-service
      - notifications-service
    ports:
      - "3010:80"

  # ===== Inventory Module =====
